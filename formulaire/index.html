<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous - RESO</title>
    <style>
        /* Style simple et épuré pour s'intégrer à RESO */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: #333; background-color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #d1d5db; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        .info-text { font-size: 12px; color: #6b7280; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <form id="contactForm" method="POST">
        <input type="text" name="_honey" style="display:none">
        
        <input type="hidden" name="_captcha" value="false">
        
        <input type="hidden" name="_subject" value="Nouveau message depuis le site RESO">

        <input type="hidden" name="_next" value="https://liseamaniou.github.io/reso/formulaire/">

        <div class="form-group">
            <label for="name">Nom complet</label>
            <input type="text" id="name" name="nom" placeholder="Votre nom" required>
        </div>

        <div class="form-group">
            <label for="email">Votre adresse email</label>
            <input type="email" id="email" name="email" placeholder="exemple@domaine.com" required>
        </div>

        <div class="form-group">
            <label for="topic">Sujet de votre demande</label>
            <select id="topic" name="sujet" required>
                <option value="" disabled selected>Choisissez une option...</option>
                <option value="lise.amaniou@gmail.com">Problème technique</option>
                <option value="lise.amaniou@gmail.com">Adhésions</option>
                <option value="lise.amaniou@gmail.com">Informations générales</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
        </div>

        <button type="submit" id="submitBtn">Envoyer le message</button>
        <p class="info-text">Votre message sera directement transmis à l'équipe concernée.</p>
    </form>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            const selectedEmail = document.getElementById('topic').value;
            
            // Mise à jour de l'action du formulaire dynamiquement
            form.action = "https://formsubmit.co/" + selectedEmail;
            
            // Petit feedback visuel
            btn.innerText = "Envoi en cours...";
            btn.style.opacity = "0.7";
        });
    </script>
</body>
</html>
