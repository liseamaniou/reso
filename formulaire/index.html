<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous - RESO</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: #333; background-color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #d1d5db; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
            background-color: white;
            /* Ensures select is same height as inputs */
            height: 48px; 
            appearance: none; 
            -webkit-appearance: none;
        }

        /* The Custom Arrow for the Select dropdown */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px; /* Space for the arrow */
        }

        textarea { height: auto; }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        /* Validation: Only red if 'touched' (clicked and left) and invalid */
        .touched:invalid {
            border-color: #e3342f !important;
        }

        button { 
            background: #F0A800; 
            color: white; 
            border: none; 
            padding: 12px 40px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            display: block;
            width: auto;
            margin: 0 auto; 
            transition: background 0.2s;
            font-size: 16px;
        }

        button:hover { background: #d99700; }

        #success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="success-message">
        <h3 style="margin-top:0;">Merci !</h3>
        <p>Votre message a été envoyé avec succès.</p>
    </div>

    <form id="contactForm" method="POST">
        <input type="text" name="_honey" style="display:none">
        <input type="hidden" name="_captcha" value="false">
        <!-- <input type="hidden" name="_subject" value="Nouveau message depuis le formulaire Reso"> -->
        <input type="hidden" name="_subject" id="dynamic_subject">
        <input type="hidden" name="_title" value="Nouveau message - Reso">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_next" value="https://liseamaniou.github.io/reso/formulaire?page=merci">
        
        <input type="hidden" name="Sujet_Demande" id="hidden_subject">

        <div class="form-group">
            <label for="firstname">Prénom</label>
            <input type="text" id="firstname" name="Prenom" placeholder="Votre prénom" required>
        </div>
        
        <div class="form-group">
            <label for="lastname">Nom</label>
            <input type="text" id="lastname" name="Nom" placeholder="Votre nom" required>
        </div>

        <div class="form-group">
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" placeholder="exemple@domaine.com" required>
        </div>

        <div class="form-group">
            <label for="topic">Motif de votre demande</label>
            <select id="topic" required>
                <option value="" disabled selected>Choisissez une option...</option>
                <option value="lise.amaniou@gmail.com">Problème technique</option>
                <option value="lise.amaniou@gmail.com">Adhésions</option>
                <option value="lise@fabricemidal.fr">Informations générales</option>
                <option value="martin.monin@gmail.com">Test Martin</option>
            </select>
        </div>

        <div class="form-group">
            <label for="user_subject">Objet de votre message</label>
            <input type="text" id="user_subject" placeholder="De quoi s'agit-il ?" required>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="Message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
        </div>

        <button type="submit" id="submitBtn">Envoyer</button>
    </form>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const topicSelect = document.getElementById('topic');
        const userSubjectInput = document.getElementById('user_subject');
        const hiddenSubject = document.getElementById('hidden_subject');
        const dynamicSubject = document.getElementById('dynamic_subject');
        const inputs = form.querySelectorAll('input, select, textarea');

        // Validation logic
        inputs.forEach(input => {
            input.addEventListener('blur', () => {
                input.classList.add('touched');
            });
        });

        // Submission Logic
        form.addEventListener('submit', function(e) {
            // 1. Get values
            const firstName = document.getElementById('firstname').value;
            const lastName = document.getElementById('lastname').value;
            const userSubject = userSubjectInput.value;
            const selectedEmail = topicSelect.value;

            // 2. Set the destination email
            form.action = "https://formsubmit.co/" + selectedEmail;

            // 3. Create the unique subject line (using dynamicSubject consistently)
            dynamicSubject.value = "Reso : " + userSubject + " (" + firstName + " " + lastName + ")";

            // 4. Capture the TEXT of the option (e.g. "Adhésions") for the email body
            hiddenSubject.value = topicSelect.options[topicSelect.selectedIndex].text;
            
            btn.innerText = "Envoi en cours...";
            btn.style.opacity = "0.7";
        });

        // Success logic
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('page') === 'merci') {
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }
    </script>
</body>
</html>
