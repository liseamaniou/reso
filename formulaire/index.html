<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous - RESO</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: #333; background-color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #d1d5db; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
            background-color: white;
            /* Ensures select is same height as inputs */
            height: 48px; 
            appearance: none; 
            -webkit-appearance: none;
        }

        /* Adjusting textarea back to auto height since it needs to grow */
        textarea { height: auto; }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        /* 1. Only show red border if the field has the 'touched' class and is invalid */
        .touched:invalid {
            border-color: #e3342f !important;
        }

        /*button { 
            background: #F0A800; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
            font-size: 16px;
        }*/

        button { 
            background: #F0A800; 
            color: white; 
            border: none; 
            padding: 12px 40px; /* Increased side padding for a nicer look */
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            
            /* Centering logic */
            display: block;
            width: auto;
            margin: 0 auto; 
            
            transition: background 0.2s;
            font-size: 16px;
        }
        
        button:hover { background: #d99700; }
        .info-text { font-size: 12px; color: #6b7280; margin-top: 10px; text-align: center; }

        #success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="success-message">
        <h3 style="margin-top:0;">Merci !</h3>
        <p>Votre message a été envoyé avec succès.</p>
    </div>

    <form id="contactForm" method="POST">
        <input type="text" name="_honey" style="display:none">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="Nouveau message depuis le formulaire Reso">
        <input type="hidden" name="_title" value="Nouveau message - Reso">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_next" value="https://liseamaniou.github.io/reso/formulaire?page=merci">

        <div class="form-group">
            <label for="firstname">Prénom</label>
            <input type="text" id="firstname" name="prenom" placeholder="Votre prénom" required>
        </div>
        
        <div class="form-group">
            <label for="lastname">Nom</label>
            <input type="text" id="lastname" name="nom" placeholder="Votre nom" required>
        </div>

        <div class="form-group">
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" placeholder="exemple@domaine.com" required>
        </div>

        <div class="form-group">
            <label for="topic">Objet de votre demande</label>
            <select id="topic" name="sujet" required>
                <option value="" disabled selected>Choisissez une option...</option>
                <option value="lise.amaniou@gmail.com">Problème technique</option>
                <option value="lise.amaniou@gmail.com">Adhésions</option>
                <option value="lise@fabricemidal.com">Informations générales</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
        </div>

        <button type="submit" id="submitBtn">Envoyer</button>
    </form>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const inputs = form.querySelectorAll('input, select, textarea');

        // Logic: Add 'touched' class when user leaves the field (blur)
        inputs.forEach(input => {
            input.addEventListener('blur', () => {
                input.classList.add('touched');
            });
        });

        // Form Submission Logic
        form.addEventListener('submit', function(e) {
            const selectedEmail = document.getElementById('topic').value;
            form.action = "https://formsubmit.co/" + selectedEmail;
            
            btn.innerText = "Envoi en cours...";
            btn.style.opacity = "0.7";
        });

        // Success message logic
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('page') === 'merci') {
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
        }
    </script>
</body>
</html>
